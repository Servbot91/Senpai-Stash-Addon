name: Build Zip and Update Metadata

on:
  push:
    branches:
      - main
    paths:
      - 'plugins/senpai-addon-pack/**'

permissions:
  contents: write

jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      # ---------------------------------
      # Checkout repository
      # ---------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ---------------------------------
      # Get commit info
      # ---------------------------------
      - name: Get commit info
        id: commit
        run: |
          SHORT_SHA=${GITHUB_SHA::7}

          COMMIT_TS=$(git log -1 --pretty=format:'%ct')
          COMMIT_DATE=$(date -u -d @$COMMIT_TS +"%Y-%m-%d %H:%M:%S")

          echo "sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "date=$COMMIT_DATE" >> $GITHUB_OUTPUT

      # ---------------------------------
      # Build deterministic zip
      # ---------------------------------
      - name: Build senpai-addon-pack.zip
        run: |
          cd plugins
          rm -f senpai-addon-pack.zip
          find senpai-addon-pack -type f | sort | zip -X senpai-addon-pack.zip -@

      # ---------------------------------
      # Calculate SHA256
      # ---------------------------------
      - name: Calculate SHA256
        id: hash
        run: |
          HASH=$(sha256sum plugins/senpai-addon-pack.zip | awk '{print $1}')
          echo "sha256=$HASH" >> $GITHUB_OUTPUT

      # ---------------------------------
      # Update manifest.yml
      # ---------------------------------
      - name: Update version, date, sha256
        run: |
          FILE="plugins/manifest.yml"

          sed -i "s|version:.*|version: 1.0-${{ steps.commit.outputs.sha }}|" $FILE
          sed -i "s|date:.*|date: ${{ steps.commit.outputs.date }}|" $FILE
          sed -i "s|sha256:.*|sha256: ${{ steps.hash.outputs.sha256 }}|" $FILE

      # ---------------------------------
      # Commit updated files
      # ---------------------------------
      - name: Commit updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add plugins/senpai-addon-pack.zip
          git add plugins/manifest.yml

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-build plugin zip (1.0-${{ steps.commit.outputs.sha }}) [skip ci]"
            git push
          fi
